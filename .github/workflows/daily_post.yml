name: Daily LinkedIn Post

on:
  schedule:
    # Roda todos os dias às 13:00 UTC (10:00 Horário de Brasília)
    - cron: '0 13 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo site do GitHub

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install google-generativeai requests python-dotenv

      - name: Run Automation
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_ORG_ID: ${{ secrets.BUFFER_ORG_ID }}
          BUFFER_PROFILE_ID: ${{ secrets.BUFFER_PROFILE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Adiciona um atraso aleatório de até 60 minutos para variar o horário
          python -c "import time, random; time.sleep(random.randint(0, 3600))"
          python generate_and_post.py
